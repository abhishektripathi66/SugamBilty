<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#e63946">
<title>LR Bilty Filter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

<style>
  :root {
    --red:#e63946;--dark:#1a1a2e;--panel:#16213e;
    --field:#0f3460;--border:#2a3a5e;--gold:#f4a261;
    --text:#e0e0e0;--muted:#8892b0;--green:#2dc653;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,'Noto Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
  .topbar{background:var(--red);padding:14px 20px 12px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.4);}
  .topbar-icon{font-size:22px;}
  .topbar-title{font-size:18px;font-weight:700;color:#fff;letter-spacing:0.5px;}
  .topbar-sub{font-size:11px;color:rgba(255,255,255,0.75);margin-top:1px;}
  .main{flex:1;padding:20px 16px;max-width:640px;margin:0 auto;width:100%;}
  .card{background:var(--panel);border-radius:14px;padding:20px;margin-bottom:16px;border:1px solid var(--border);}
  .card-title{font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
  
  /* Storage & Auth Styles */
  .storage-box { background: var(--field); border-radius: 10px; padding: 14px; margin-bottom: 16px; border: 1px solid var(--border);}
  .storage-label { display: block; font-size: 12px; font-weight: 600; color: var(--gold); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;}
  .radio-group { display: flex; flex-direction: column; gap: 10px; }
  .radio-opt { display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; }
  
  .auth-section { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); display: none; }
  .auth-section.show { display: block; }
  
  .user-profile { display: none; align-items: center; gap: 12px; background: rgba(44,198,83,0.1); border: 1px solid var(--green); padding: 10px; border-radius: 8px;}
  .user-profile.show { display: flex; }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; }
  .user-info { flex: 1; }
  .user-name { font-size: 13px; font-weight: 700; color: var(--green); }
  .user-email { font-size: 11px; color: var(--muted); }
  .btn-signout { background: none; border: none; color: var(--red); font-size: 11px; cursor: pointer; text-decoration: underline; }

  /* Generic UI */
  .upload-zone{border:2px dashed var(--border);border-radius:12px;padding:32px 20px;text-align:center;cursor:pointer;transition:border-color 0.2s,background 0.2s;position:relative;}
  .upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .upload-icon{font-size:40px;margin-bottom:10px;}
  .upload-label{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px;}
  .upload-hint{font-size:12px;color:var(--muted);}
  .file-info{display:none;background:rgba(44,198,83,0.1);border:1px solid var(--green);border-radius:10px;padding:12px 16px;margin-top:12px;align-items:center;gap:12px;}
  .file-info.show{display:flex;}
  
  /* Pickers & Buttons */
  .col-picker-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .col-action-btn{background:var(--field);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;}
  .col-list{display:flex;flex-direction:column;gap:4px;max-height:340px;overflow-y:auto;}
  .col-item{display:flex;align-items:center;gap:10px;background:var(--field);border:1px solid var(--border);border-radius:8px;padding:9px 12px;cursor:pointer;}
  .col-item.selected{border-color:var(--green);background:rgba(44,198,83,0.08);}
  .col-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;}
  .col-item.selected .col-check{background:var(--green);border-color:var(--green);color:#fff;}
  .col-name{font-size:12px;flex:1;}
  
  .btn-process{width:100%;padding:16px;background:var(--red);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;display:flex;justify-content:center;}
  .btn-process:disabled{opacity:0.4;cursor:not-allowed;}
  .progress-wrap{display:none;margin-top:12px;}
  .progress-wrap.show{display:block;}
  .progress-bar-bg{background:var(--field);border-radius:100px;height:8px;overflow:hidden;margin-bottom:6px;}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));width:0%;transition:width 0.3s;}
  .progress-text{font-size:11px;color:var(--muted);text-align:center;}
  
  .result-card{display:none;background:rgba(44,198,83,0.08);border:1px solid var(--green);border-radius:14px;padding:20px;text-align:center;margin-bottom:16px;}
  .result-card.show{display:block;}
  .btn-download{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;}
  .btn-reset{display:block;margin:10px auto 0;background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 20px;cursor:pointer;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-icon">&#x1F69B;</div>
  <div>
    <div class="topbar-title">LR Bilty Filter</div>
    <div class="topbar-sub">Upload &rarr; Pick columns &rarr; Export</div>
  </div>
</div>

<div class="main">

  <div class="storage-box">
    <span class="storage-label">💾 Save History To:</span>
    <div class="radio-group">
      <label class="radio-opt">
        <input type="radio" name="storageType" value="local" checked onchange="toggleAuthUI()"> 
        📱 Local Device (Offline IndexedDB)
      </label>
      <label class="radio-opt">
        <input type="radio" name="storageType" value="cloud" onchange="toggleAuthUI()"> 
        ☁️ Google Drive (Requires Login)
      </label>
    </div>

    <div id="authSection" class="auth-section">
      <div id="googleBtnContainer" style="display:flex; justify-content:center;"></div>
      
      <div id="userProfile" class="user-profile">
        <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
        <div class="user-info">
          <div id="userName" class="user-name"></div>
          <div id="userEmail" class="user-email">Connected to Drive</div>
        </div>
        <button class="btn-signout" onclick="signOut()">Sign Out</button>
      </div>
    </div>
  </div>

  <div class="result-card" id="resultCard">
    <div style="font-size:48px;margin-bottom:8px;">&#x2705;</div>
    <div style="font-size:17px;font-weight:700;color:var(--green);margin-bottom:4px;">Success!</div>
    <div id="resultSub" style="font-size:12px;color:var(--muted);margin-bottom:16px;">Ready</div>
    <button class="btn-download" id="downloadBtn">&#x2B07;&#xFE0F; Download XLSX</button>
    <button class="btn-reset" onclick="resetApp()">Process another file</button>
  </div>

  <div class="card" id="uploadCard">
    <div class="card-title">&#x1F4C2; Step 1 &mdash; Upload LR Bilty File</div>
    <div class="upload-zone" id="uploadZone">
      <input type="file" accept=".xlsx,.xls" id="fileInput" onchange="handleFile(this.files[0])">
      <div class="upload-icon">&#x1F4CA;</div>
      <div class="upload-label">Tap to select XLSX file</div>
    </div>
    <div class="file-info" id="fileInfo">
      <div style="font-size:24px">&#x1F4C4;</div>
      <div>
        <div id="fileName" style="font-size:13px;font-weight:600;color:var(--green);"></div>
        <div id="fileRows" style="font-size:11px;color:var(--muted);"></div>
      </div>
    </div>
  </div>

  <div class="card" id="colPickerCard" style="display:none">
    <div class="card-title">&#x2699;&#xFE0F; Step 2 &mdash; Choose Columns</div>
    <div class="col-list" id="colList"></div>
  </div>

  <button class="btn-process" id="processBtn" onclick="processFile()" disabled>Filter &amp; Export XLSX</button>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">Processing...</div>
  </div>

</div>

<script>
// ==========================================
// 1. GOOGLE DRIVE & AUTHENTICATION CONFIGURATION
// ==========================================
// REPLACE THIS WITH YOUR ACTUAL CLIENT ID
const CLIENT_ID = 'YOUR_CLIENT_ID_HERE.apps.googleusercontent.com';
const API_KEY = 'YOUR_API_KEY_HERE';
const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';

let tokenClient;
let isAuthenticated = false;
let driveAccessToken = null;

function gapiLoaded() { 
  gapi.load('client', async () => { 
    await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] }); 
  }); 
}

function gisLoaded() {
  // 1. Initialize the Google Sign-In Identity Client (Profile details)
  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: handleCredentialResponse,
    auto_select: true
  });
  
  // Render the official button
  google.accounts.id.renderButton(
    document.getElementById("googleBtnContainer"),
    { theme: "filled_black", size: "large", shape: "pill", width: "250" }
  );

  // 2. Initialize the Token Client (For Drive Upload Permissions)
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error) {
        alert("Drive permission denied.");
        return;
      }
      driveAccessToken = resp.access_token;
      // Continue processing the file now that we have the token
      executeCloudExport();
    },
  });
}

// Decodes the JWT token Google sends back upon successful Sign-In
function parseJwt(token) {
  var base64Url = token.split('.')[1];
  var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
  var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
      return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
  }).join(''));
  return JSON.parse(jsonPayload);
}

function handleCredentialResponse(response) {
  const profile = parseJwt(response.credential);
  isAuthenticated = true;
  
  // Update UI with Profile Info
  document.getElementById('googleBtnContainer').style.display = 'none';
  document.getElementById('userProfile').classList.add('show');
  
  document.getElementById('userName').textContent = profile.given_name || profile.name;
  document.getElementById('userAvatar').src = profile.picture;
}

function signOut() {
  google.accounts.id.disableAutoSelect();
  isAuthenticated = false;
  driveAccessToken = null;
  document.getElementById('googleBtnContainer').style.display = 'flex';
  document.getElementById('userProfile').classList.remove('show');
}

function toggleAuthUI() {
  const isCloud = document.querySelector('input[name="storageType"]:checked').value === 'cloud';
  const authSection = document.getElementById('authSection');
  if (isCloud) {
    authSection.classList.add('show');
  } else {
    authSection.classList.remove('show');
  }
}

// ==========================================
// 2. EXPORT & CLOUD UPLOAD LOGIC
// ==========================================
async function uploadToDrive(blob, filename) {
  setProgress(80, 'Creating file in Drive...');
  const metadataRes = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + driveAccessToken, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: filename, mimeType: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' })
  });
  const fileMeta = await metadataRes.json();
  if(fileMeta.error) throw new Error(fileMeta.error.message);

  setProgress(90, 'Uploading bytes to Drive...');
  await fetch(`https://upload.googleapis.com/upload/drive/v3/files/${fileMeta.id}?uploadType=media`, {
    method: 'PATCH',
    headers: { 'Authorization': 'Bearer ' + driveAccessToken, 'Content-Type': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' },
    body: blob
  });
}

async function saveToLocal(data, cols, filename) {
  let history = await localforage.getItem('bilty_history') || [];
  history.unshift({ date: new Date().toLocaleString(), filename, data, cols });
  if (history.length > 10) history.pop();
  await localforage.setItem('bilty_history', history);
}

// ==========================================
// 3. CORE APP LOGIC
// ==========================================
var DEFAULT_COLS = ['LR Number', 'LR Date', 'Consignor Name', 'Consignor GST Number', 'Consignor City', 'Consignee Name', 'Consignee GST Number', 'Truck From', 'Freight Subtotal', 'Total Freight Amount'];
var allColumns = [], selectedColumns = [], fileData = null, generatedBlob = null, generatedFilename = null;

function handleFile(file) {
  if (!file) return;
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('fileInfo').classList.add('show');
  
  var reader = new FileReader();
  reader.onload = function(e) {
    var wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
    var ws = wb.Sheets[wb.SheetNames[0]];
    var headerRow = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false })[0] || [];
    fileData = XLSX.utils.sheet_to_json(ws, { raw: false, dateNF: 'DD/MM/YYYY', defval: '' });
    
    allColumns = headerRow.filter(c => c);
    selectedColumns = DEFAULT_COLS.filter(c => allColumns.includes(c));
    document.getElementById('fileRows').textContent = fileData.length + ' records found';
    
    var list = document.getElementById('colList');
    list.innerHTML = allColumns.map(col => {
      var sel = selectedColumns.includes(col);
      return `<div class="col-item ${sel?'selected':''}" onclick="toggleCol(this, '${col}')"><div class="col-check">${sel?'&#x2713;':''}</div><span class="col-name">${col}</span></div>`;
    }).join('');
    
    document.getElementById('colPickerCard').style.display = 'block';
    document.getElementById('processBtn').disabled = false;
  };
  reader.readAsArrayBuffer(file);
}

function toggleCol(el, col) {
  var idx = selectedColumns.indexOf(col);
  if (idx === -1) { selectedColumns.push(col); el.classList.add('selected'); el.querySelector('.col-check').innerHTML = '&#x2713;'; } 
  else { selectedColumns.splice(idx, 1); el.classList.remove('selected'); el.querySelector('.col-check').innerHTML = ''; }
  document.getElementById('processBtn').disabled = selectedColumns.length === 0;
}

function processFile() {
  const isCloud = document.querySelector('input[name="storageType"]:checked').value === 'cloud';
  
  if (isCloud && !isAuthenticated) {
    return alert("Please Sign In with Google first to save to Drive.");
  }

  document.getElementById('processBtn').disabled = true;
  document.getElementById('progressWrap').classList.add('show');
  setProgress(20, 'Filtering data...');

  setTimeout(() => {
    var orderedCols = allColumns.filter(c => selectedColumns.includes(c));
    var filtered = fileData.map(row => { var out={}; orderedCols.forEach(col => out[col]=row[col]||''); return out; });

    setProgress(50, 'Building XLSX Blob...');
    var newWb = XLSX.utils.book_new();
    var newWs = XLSX.utils.json_to_sheet(filtered, { header: orderedCols });
    XLSX.utils.book_append_sheet(newWb, newWs, 'Sheet1');
    var out = XLSX.write(newWb, { bookType: 'xlsx', type: 'array' });
    
    generatedBlob = new Blob([out], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    generatedFilename = 'filtered_' + Date.now() + '.xlsx';

    if (isCloud) {
      // If cloud, we need the Drive token first.
      if (gapi.client.getToken() === null || !driveAccessToken) {
        setProgress(60, 'Requesting Drive permission...');
        tokenClient.requestAccessToken({prompt: 'consent'});
      } else {
        executeCloudExport();
      }
    } else {
      // Local save
      setProgress(80, 'Saving locally...');
      saveToLocal(filtered, orderedCols, generatedFilename).then(finishExport);
    }
  }, 100);
}

// Called after Drive token is successfully retrieved
async function executeCloudExport() {
  try {
    await uploadToDrive(generatedBlob, generatedFilename);
    finishExport();
  } catch(err) {
    handleExportError(err);
  }
}

function finishExport() {
  setProgress(100, 'Done!');
  var url = URL.createObjectURL(generatedBlob);
  
  document.getElementById('downloadBtn').onclick = function() {
    var a = document.createElement('a'); a.href = url; a.download = generatedFilename; a.click();
  };
  
  document.getElementById('resultCard').classList.add('show');
  document.getElementById('progressWrap').classList.remove('show');
  document.getElementById('uploadCard').style.display = 'none';
  document.getElementById('colPickerCard').style.display = 'none';
  document.getElementById('processBtn').style.display = 'none';
}

function handleExportError(err) {
  document.getElementById('progressWrap').classList.remove('show');
  document.getElementById('processBtn').disabled = false;
  alert('Failed: ' + err.message);
}

function setProgress(pct, text) { document.getElementById('progressFill').style.width = pct + '%'; document.getElementById('progressText').textContent = text; }
function resetApp() { location.reload(); }
</script>
</body>
</html>
